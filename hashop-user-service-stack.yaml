AWSTemplateFormatVersion: "2010-09-09"
Description: HaShop User Service Test Stack - Single EC2 + RDS + Cognito + Lambda

Parameters:
  ProjectName:
    Type: String
    Default: hashop

  EnvironmentName:
    Type: String
    Default: test

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing EC2 Key Pair name for SSH

  AllowedSSHIp:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed to SSH into EC2. For demo only, 0.0.0.0/0 is acceptable but not recommended long term.

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium

  VpcCidr:
    Type: String
    Default: 10.20.0.0/16

  AvailabilityZone1:
    Type: String
    Default: ap-southeast-1a
    Description: First Availability Zone for public subnet and private subnet 1

  AvailabilityZone2:
    Type: String
    Default: ap-southeast-1b
    Description: Second Availability Zone for private subnet 2

  PublicSubnetCidr:
    Type: String
    Default: 10.20.1.0/24

  PrivateSubnet1Cidr:
    Type: String
    Default: 10.20.11.0/24

  PrivateSubnet2Cidr:
    Type: String
    Default: 10.20.12.0/24

  DBName:
    Type: String
    Default: ecommerce_user_db

  DBUsername:
    Type: String
    Default: admin

  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: RDS master password

  DBInstanceClass:
    Type: String
    Default: db.t3.micro

  DBAllocatedStorage:
    Type: Number
    Default: 20

  UserServiceRepoUrl:
    Type: String
    Default: https://github.com/Leviethaidang/User-Service.git

  FrontendRepoUrl:
    Type: String
    Default: https://github.com/Leviethaidang/Front-end.git

  GitBranch:
    Type: String
    Default: main

  LambdaCodeS3Bucket:
    Type: String
    Description: S3 bucket containing Lambda function.zip

  LambdaCodeS3Key:
    Type: String
    Default: lambda/user-post-confirmation/function.zip

  BootstrapScriptS3Bucket:
    Type: String
    Description: S3 bucket containing hashop-bootstrap.sh

  BootstrapScriptS3Key:
    Type: String
    Default: bootstrap/hashop-bootstrap.sh
    Description: S3 key of hashop-bootstrap.sh

  ProductDBName:
    Type: String
    Default: ecommerce_product_db

  ProductServiceRepoUrl:
    Type: String
    Default: https://github.com/Leviethaidang/Product-Service.git

  CartDBName:
    Type: String
    Default: ecommerce_cart_db

  CartServiceRepoUrl:
    Type: String
    Default: https://github.com/Leviethaidang/Cart-Service.git

  InternalApiKey:
    Type: String
    NoEcho: true
    Default: Letmein123!!!
    Description: Internal API key shared between services for test environment
  
  PaymentDBName:
    Type: String
    Default: ecommerce_payment_db

  OrderDBName:
    Type: String
    Default: ecommerce_order_db

  PaymentServiceRepoUrl:
    Type: String
    Default: https://github.com/Leviethaidang/Payment-Service.git

  OrderServiceRepoUrl:
    Type: String
    Default: https://github.com/Leviethaidang/Order-Service.git

  InventoryDBName:
    Type: String
    Default: ecommerce_inventory_db

  InventoryServiceRepoUrl:
    Type: String
    Default: https://github.com/Leviethaidang/Inventory-Service.git

  NotificationServiceRepoUrl:
    Type: String
    Default: https://github.com/Leviethaidang/Notification-Service.git

  SESFromEmail:
    Type: String
    Description: Verified SES sender email, for example Leviethaidang061104@gmail.com

  AdminEmail:
    Type: String
    Description: Admin email to receive new order notifications

Resources:
  HashopVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-igw

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref HashopVPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref HashopVPC
      CidrBlock: !Ref PublicSubnetCidr
      AvailabilityZone: !Ref AvailabilityZone1
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-public-subnet

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref HashopVPC
      CidrBlock: !Ref PrivateSubnet1Cidr
      AvailabilityZone: !Ref AvailabilityZone1
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-private-subnet-1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref HashopVPC
      CidrBlock: !Ref PrivateSubnet2Cidr
      AvailabilityZone: !Ref AvailabilityZone2
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-private-subnet-2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref HashopVPC
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-public-rt

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: HaShop EC2 SG
      VpcId: !Ref HashopVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSSHIp
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-ec2-sg

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: HaShop Lambda SG
      VpcId: !Ref HashopVPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-lambda-sg

  DatabaseSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: HaShop RDS SG
      VpcId: !Ref HashopVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref EC2SecurityGroup
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-db-sg

  UserDBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: HaShop User DB subnet group
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-user-db-subnet-group

  UserDB:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Engine: mysql
      DBName: !Ref DBName
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: !Ref DBAllocatedStorage
      StorageType: gp2
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      PubliclyAccessible: false
      MultiAZ: false
      BackupRetentionPeriod: 0
      DeletionProtection: false
      DBSubnetGroupName: !Ref UserDBSubnetGroup
      VPCSecurityGroups:
        - !Ref DatabaseSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-user-db

  ProductImageBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      BucketName: !Sub ${ProjectName}-${EnvironmentName}-product-images-${AWS::AccountId}-${AWS::Region}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - "*"
            AllowedMethods:
              - GET
              - PUT
              - HEAD
            AllowedHeaders:
              - "*"
            ExposedHeaders:
              - ETag
            MaxAge: 3000
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-product-images

  ProductCloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${ProjectName}-${EnvironmentName}-product-images-oac
        Description: OAC for HaShop product images bucket
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  ProductImageDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub ${ProjectName}-${EnvironmentName} product image distribution
        Origins:
          - Id: ProductImageS3Origin
            DomainName: !GetAtt ProductImageBucket.RegionalDomainName
            OriginAccessControlId: !Ref ProductCloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: ProductImageS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        PriceClass: PriceClass_100

  ProductImageBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ProductImageBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontReadProductImages
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action:
              - s3:GetObject
            Resource: !Sub ${ProductImageBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${ProductImageDistribution}

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-user-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole

  PostConfirmationFunction:
    Type: AWS::Lambda::Function
    DependsOn: UserDB
    Properties:
      FunctionName: !Sub ${ProjectName}-${EnvironmentName}-user-post-confirmation
      Runtime: nodejs20.x
      Handler: index.handler
      Timeout: 20
      MemorySize: 128
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
      Environment:
        Variables:
          DB_HOST: !GetAtt UserDB.Endpoint.Address
          DB_USER: !Ref DBUsername
          DB_PASSWORD: !Ref DBPassword
          DB_NAME: !Ref DBName

  LambdaInvokePermissionForCognito:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PostConfirmationFunction
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceAccount: !Ref AWS::AccountId

  UserPool:
    Type: AWS::Cognito::UserPool
    DependsOn:
      - LambdaInvokePermissionForCognito
      - PostConfirmationFunction
    Properties:
      UserPoolName: !Sub ${ProjectName}-${EnvironmentName}-user-pool
      UsernameAttributes:
        - email
      UsernameConfiguration:
        CaseSensitive: false
      AutoVerifiedAttributes:
        - email
      MfaConfiguration: "OFF"
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: name
          AttributeDataType: String
          Required: false
          Mutable: true
        - Name: phone_number
          AttributeDataType: String
          Required: false
          Mutable: true
      LambdaConfig:
        PostConfirmation: !GetAtt PostConfirmationFunction.Arn
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ${ProjectName}-${EnvironmentName}-user-service-client
      UserPoolId: !Ref UserPool
      GenerateSecret: true
      ExplicitAuthFlows:
        - ALLOW_USER_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      SupportedIdentityProviders:
        - COGNITO
      EnableTokenRevocation: true

  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: Admin
      UserPoolId: !Ref UserPool
      Description: HaShop admin users
      Precedence: 1

  CustomerGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: Customer
      UserPoolId: !Ref UserPool
      Description: HaShop customer users
      Precedence: 2

  PaymentRequestedTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${ProjectName}-${EnvironmentName}-payment-requested-topic
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-payment-requested-topic

  PaymentResultTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${ProjectName}-${EnvironmentName}-payment-result-topic
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-payment-result-topic

  PaymentRequestedQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${ProjectName}-${EnvironmentName}-payment-requested-queue
      VisibilityTimeout: 60
      MessageRetentionPeriod: 345600
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-payment-requested-queue

  PaymentResultQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${ProjectName}-${EnvironmentName}-payment-result-queue
      VisibilityTimeout: 60
      MessageRetentionPeriod: 345600
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-payment-result-queue

  PaymentRequestedQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref PaymentRequestedQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowPaymentRequestedTopicToSendMessage
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action:
              - sqs:SendMessage
            Resource: !GetAtt PaymentRequestedQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref PaymentRequestedTopic

  PaymentResultQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref PaymentResultQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowPaymentResultTopicToSendMessage
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action:
              - sqs:SendMessage
            Resource: !GetAtt PaymentResultQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref PaymentResultTopic

  PaymentRequestedSubscription:
    Type: AWS::SNS::Subscription
    DependsOn: PaymentRequestedQueuePolicy
    Properties:
      TopicArn: !Ref PaymentRequestedTopic
      Protocol: sqs
      Endpoint: !GetAtt PaymentRequestedQueue.Arn
      RawMessageDelivery: true

  PaymentResultSubscription:
    Type: AWS::SNS::Subscription
    DependsOn: PaymentResultQueuePolicy
    Properties:
      TopicArn: !Ref PaymentResultTopic
      Protocol: sqs
      Endpoint: !GetAtt PaymentResultQueue.Arn
      RawMessageDelivery: true

  NotificationRequestedTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${ProjectName}-${EnvironmentName}-notification-requested-topic
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-notification-requested-topic

  NotificationRequestedQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${ProjectName}-${EnvironmentName}-notification-requested-queue
      VisibilityTimeout: 60
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-notification-requested-queue

  NotificationRequestedQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref NotificationRequestedQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowNotificationRequestedTopicToSendMessage
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt NotificationRequestedQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref NotificationRequestedTopic

  NotificationRequestedSubscription:
    Type: AWS::SNS::Subscription
    DependsOn: NotificationRequestedQueuePolicy
    Properties:
      TopicArn: !Ref NotificationRequestedTopic
      Protocol: sqs
      Endpoint: !GetAtt NotificationRequestedQueue.Arn

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-ec2-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: !Sub ${ProjectName}-${EnvironmentName}-ec2-user-service-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:SignUp
                  - cognito-idp:ConfirmSignUp
                  - cognito-idp:InitiateAuth
                  - cognito-idp:AdminInitiateAuth
                  - cognito-idp:AdminGetUser
                  - cognito-idp:AdminUpdateUserAttributes
                  - cognito-idp:AdminDeleteUser
                  - cognito-idp:AdminDisableUser
                  - cognito-idp:AdminEnableUser
                  - cognito-idp:AdminAddUserToGroup
                  - cognito-idp:AdminRemoveUserFromGroup
                  - cognito-idp:ListUsers
                  - cognito-idp:ListUsersInGroup
                  - cognito-idp:GlobalSignOut
                Resource: !GetAtt UserPool.Arn
                
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource: !Sub ${ProductImageBucket.Arn}/*

              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !GetAtt ProductImageBucket.Arn

              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub arn:aws:s3:::${BootstrapScriptS3Bucket}/${BootstrapScriptS3Key}

              - Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Ref PaymentRequestedTopic
                  - !Ref PaymentResultTopic
                  - !Ref NotificationRequestedTopic

              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:ChangeMessageVisibility
                  - sqs:GetQueueAttributes
                  - sqs:GetQueueUrl
                Resource:
                  - !GetAtt PaymentRequestedQueue.Arn
                  - !GetAtt PaymentResultQueue.Arn
                  - !GetAtt NotificationRequestedQueue.Arn
              
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  UserServiceEC2:
    Type: AWS::EC2::Instance
    DependsOn:
      - UserDB
      - UserPool
      - UserPoolClient
      - AdminGroup
      - CustomerGroup
      - ProductImageBucket
      - ProductImageDistribution
      - PaymentRequestedTopic
      - PaymentResultTopic
      - PaymentRequestedQueue
      - PaymentResultQueue
      - PaymentRequestedSubscription
      - PaymentResultSubscription
      - NotificationRequestedTopic
      - NotificationRequestedQueue
      - NotificationRequestedSubscription

    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-user-service-ec2
      UserData:
        Fn::Base64:
          Fn::Sub:
            - |
              #!/bin/bash -xe

              exec > >(tee /var/log/hashop-userdata.log | logger -t hashop-userdata -s 2>/dev/console) 2>&1

              dnf update -y
              dnf install -y awscli || dnf install -y aws-cli

              mkdir -p /opt/hashop

              cat > /opt/hashop/bootstrap.env <<'EOF_HASHOP_ENV'
              export AWS_REGION='${AWSRegion}'
              export DB_ENDPOINT='${DBEndpoint}'
              export DB_USERNAME='${DBUsername}'
              export DB_PASSWORD='${DBPassword}'

              export USER_DB_NAME='${UserDBName}'
              export PRODUCT_DB_NAME='${ProductDBName}'
              export INVENTORY_DB_NAME='${InventoryDBName}'
              export CART_DB_NAME='${CartDBName}'
              export PAYMENT_DB_NAME='${PaymentDBName}'
              export ORDER_DB_NAME='${OrderDBName}'

              export USER_POOL_ID='${UserPoolId}'
              export USER_POOL_CLIENT_ID='${UserPoolClientId}'
              export USER_POOL_CLIENT_SECRET='${UserPoolClientSecret}'

              export PRODUCT_IMAGE_BUCKET_NAME='${ProductImageBucketName}'
              export PRODUCT_CLOUDFRONT_DOMAIN='${ProductCloudFrontDomain}'

              export INTERNAL_API_KEY='${InternalApiKey}'
              export GIT_BRANCH='${GitBranch}'

              export USER_SERVICE_REPO_URL='${UserServiceRepoUrl}'
              export PRODUCT_SERVICE_REPO_URL='${ProductServiceRepoUrl}'
              export INVENTORY_SERVICE_REPO_URL='${InventoryServiceRepoUrl}'
              export CART_SERVICE_REPO_URL='${CartServiceRepoUrl}'
              export PAYMENT_SERVICE_REPO_URL='${PaymentServiceRepoUrl}'
              export ORDER_SERVICE_REPO_URL='${OrderServiceRepoUrl}'
              export FRONTEND_REPO_URL='${FrontendRepoUrl}'

              export PAYMENT_REQUESTED_TOPIC_ARN='${PaymentRequestedTopicArn}'
              export PAYMENT_RESULT_TOPIC_ARN='${PaymentResultTopicArn}'
              export PAYMENT_REQUESTED_QUEUE_URL='${PaymentRequestedQueueUrl}'
              export PAYMENT_RESULT_QUEUE_URL='${PaymentResultQueueUrl}'

              export NOTIFICATION_SERVICE_REPO_URL='${NotificationServiceRepoUrl}'
              export NOTIFICATION_REQUESTED_TOPIC_ARN='${NotificationRequestedTopicArn}'
              export NOTIFICATION_REQUESTED_QUEUE_URL='${NotificationRequestedQueueUrl}'
              export SES_FROM_EMAIL='${SESFromEmail}'
              export ADMIN_EMAIL='${AdminEmail}'

              EOF_HASHOP_ENV

              chmod 600 /opt/hashop/bootstrap.env

              aws s3 cp s3://${BootstrapScriptS3Bucket}/${BootstrapScriptS3Key} /opt/hashop/hashop-bootstrap.sh --region ${AWSRegion}

              chmod +x /opt/hashop/hashop-bootstrap.sh

              /opt/hashop/hashop-bootstrap.sh
            - AWSRegion: !Ref AWS::Region
              DBEndpoint: !GetAtt UserDB.Endpoint.Address
              DBUsername: !Ref DBUsername
              DBPassword: !Ref DBPassword

              UserDBName: !Ref DBName
              ProductDBName: !Ref ProductDBName
              InventoryDBName: !Ref InventoryDBName
              CartDBName: !Ref CartDBName
              PaymentDBName: !Ref PaymentDBName
              OrderDBName: !Ref OrderDBName

              UserPoolId: !Ref UserPool
              UserPoolClientId: !Ref UserPoolClient
              UserPoolClientSecret: !GetAtt UserPoolClient.ClientSecret

              ProductImageBucketName: !Ref ProductImageBucket
              ProductCloudFrontDomain: !GetAtt ProductImageDistribution.DomainName

              InternalApiKey: !Ref InternalApiKey
              GitBranch: !Ref GitBranch

              UserServiceRepoUrl: !Ref UserServiceRepoUrl
              ProductServiceRepoUrl: !Ref ProductServiceRepoUrl
              InventoryServiceRepoUrl: !Ref InventoryServiceRepoUrl
              CartServiceRepoUrl: !Ref CartServiceRepoUrl
              PaymentServiceRepoUrl: !Ref PaymentServiceRepoUrl
              OrderServiceRepoUrl: !Ref OrderServiceRepoUrl
              FrontendRepoUrl: !Ref FrontendRepoUrl

              PaymentRequestedTopicArn: !Ref PaymentRequestedTopic
              PaymentResultTopicArn: !Ref PaymentResultTopic
              PaymentRequestedQueueUrl: !Ref PaymentRequestedQueue
              PaymentResultQueueUrl: !Ref PaymentResultQueue

              BootstrapScriptS3Bucket: !Ref BootstrapScriptS3Bucket
              BootstrapScriptS3Key: !Ref BootstrapScriptS3Key

              NotificationServiceRepoUrl: !Ref NotificationServiceRepoUrl
              NotificationRequestedTopicArn: !Ref NotificationRequestedTopic
              NotificationRequestedQueueUrl: !Ref NotificationRequestedQueue
              SESFromEmail: !Ref SESFromEmail
              AdminEmail: !Ref AdminEmail
              
Outputs:
  WebsiteUrl:
    Description: HaShop website URL
    Value: !Sub http://${UserServiceEC2.PublicIp}

  EC2PublicIp:
    Description: EC2 public IP
    Value: !GetAtt UserServiceEC2.PublicIp

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool

  UserPoolClientId:
    Description: Cognito App Client ID
    Value: !Ref UserPoolClient

  RdsEndpoint:
    Description: RDS endpoint
    Value: !GetAtt UserDB.Endpoint.Address

  LambdaFunctionName:
    Description: Post confirmation Lambda function name
    Value: !Ref PostConfirmationFunction
  
  ProductImageBucketName:
    Description: S3 bucket for product images
    Value: !Ref ProductImageBucket

  ProductCloudFrontDomain:
    Description: CloudFront domain for product images
    Value: !GetAtt ProductImageDistribution.DomainName
  
  PaymentRequestedTopicArn:
    Description: SNS topic ARN for payment requests
    Value: !Ref PaymentRequestedTopic

  PaymentResultTopicArn:
    Description: SNS topic ARN for payment results
    Value: !Ref PaymentResultTopic

  PaymentRequestedQueueUrl:
    Description: SQS queue URL for payment requests
    Value: !Ref PaymentRequestedQueue

  PaymentResultQueueUrl:
    Description: SQS queue URL for payment results
    Value: !Ref PaymentResultQueue
  
  NotificationRequestedTopicArn:
    Description: SNS topic ARN for notification requests
    Value: !Ref NotificationRequestedTopic

  NotificationRequestedQueueUrl:
    Description: SQS queue URL for notification requests
    Value: !Ref NotificationRequestedQueue

  NotificationRequestedQueueArn:
    Description: SQS queue ARN for notification requests
    Value: !GetAtt NotificationRequestedQueue.Arn